              max = arr[i]
            }
          }
          return max
          }

 function FindFrequency(str){
   
      frequency = {};

  for(let char of str){
   if(char != " "){
    if(frequency[char]){
        frequency[char] = frequency[char]+1;
    }else{
        frequency[char] = 1; 
    }
   }
  }

   return  frequency

 }

function findSecondLargest(arr){

   let first = arr[0];
   let second = -Infinity;

   for(let i = 1; i < arr.length; i++){
      if(arr[i] > first){
       second = first;
       first = arr[i]
      }else if(arr[i] > second && arr[i] !== first){
          second = arr[i]
      }
   }
   return second
}

console.log(findSecondLargest([200,25, 38, ]));



function findLargeWord(str1){
    
 let firstword = str1.split(' ');
 let longestword = "";

 for(let word of firstword){
      if(word.length > longestword.length){
           longestword = word
      }
 }
 return longestword
}

  function findwordcount(str){

         count++
      }
